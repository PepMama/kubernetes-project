apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-admin-deployment
  namespace: recipes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-admin
  template:
    metadata:
      labels:
        app: api-admin
    spec:
      containers:
        - name: api-admin
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app-demo-pages
              mountPath: /usr/share/nginx/html/index.html
              subPath: api-admin-index.html
      volumes:
        - name: app-demo-pages
          configMap:
            name: app-demo-pages
