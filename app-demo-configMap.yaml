apiVersion: v1
kind: ConfigMap
metadata:
  name: app-demo-pages
  namespace: recipes-app
data:
  front-index.html: |
    <!DOCTYPE html>
    <html lang="fr">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Frontend Angular</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          background: linear-gradient(135deg, #0f172a, #1d4ed8);
          color: #fff;
        }
        main {
          text-align: center;
          background: rgba(255, 255, 255, 0.12);
          padding: 2rem 3rem;
          border-radius: 16px;
        }
      </style>
    </head>
    <body>
      <main>
        <h1>Frontend Angular</h1>
        <p>Point d'entrée public de la plateforme recipes-app.</p>
      </main>
    </body>
    </html>
